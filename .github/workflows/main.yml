name: BEU Notice Builder

on:
  workflow_dispatch:

jobs:
  build-notices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Ensure output files exist
        run: |
          touch notice_failed.txt
          touch notice_log.txt
          touch notice_manifest.txt

      - name: Run notice builder
        run: node notice_builder.js

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add all_notices.html all_notices.pdf notice_summary.html notice_priority.html notice_manifest.txt notice_failed.txt notice_log.txt
          git diff --cached --quiet && exit 0
          git commit -m "Auto-update: notices generated"
          git push
