name: Build notices

on:
  workflow_dispatch:

jobs:
  build-notices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run notice builder
        run: node notice_builder.js

      - name: Upload HTML
        uses: actions/upload-artifact@v4
        with:
          name: all_notices_html
          path: all_notices.html

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: all_notices_pdf
          path: all_notices.pdf

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: notice_logs
          path: |
            notice_log.txt
            notice_failed.txt
